# Browser Configuration
browser=chrome
headless=false
env=qa

# Base URL - OrangeHRM Demo
url=https://opensource-demo.orangehrmlive.com

# Admin Credentials
adminId=Admin
adminPassword=admin123

# Selenium Grid Configuration (Optional)
grid.enabled=false
grid.url=http://localhost:4444
grid.browser=chrome
grid.platform=Windows

# Wait Times (in seconds)
implicit_wait=10
explicit_wait=15

# Screenshot & Logging
screenshot_on_failure=true
log_level=INFO
